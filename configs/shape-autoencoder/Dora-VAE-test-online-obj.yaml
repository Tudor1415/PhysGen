exp_root_dir: "outputs"
name: "ShapeVAE"
tag: "test-online-obj"
seed: 0

data_type: "online-obj-datamodule"
data:
  root_dir: "./data/dataset1"
  rotate_points: false
  normalize_mesh: true
  recursive: true
  extensions: [".obj"]
  n_input_points: 32768
  coarse_pool_size: 200000
  sharp_angle_threshold_deg: 30.0
  batch_size: 1
  num_workers: 4

system_type: "shape-autoencoder-system"
system:
  sample_posterior: true
  save_mesh: false

  shape_model_type: "michelangelo-autoencoder"
  shape_model:
    pretrained_model_name_or_path: outputs/ShapeVAE/shapevae_output/ckpts/last.ckpt
    embed_dim: 64
    point_feats: 3
    out_dim: 1
    embed_type: "fourier"
    num_freqs: 8
    include_pi: false
    heads: 12
    width: 768
    num_encoder_layers: 8
    num_decoder_layers: 16
    use_ln_post: true
    init_scale: 0.25
    qkv_bias: false
    use_flash: true
    use_checkpoint: true
    use_downsample: true

  loss:
    lambda_coarse_logits: 1.0
    lambda_sharp_logits: 2.0
    lambda_kl: 0.001

  optimizer:
    name: AdamW
    args:
      lr: 1.e-5
      betas: [0.9, 0.99]
      eps: 1.e-6

trainer:
  num_nodes: 1
  max_epochs: 1000
  log_every_n_steps: 5
  num_sanity_val_steps: 1
  val_check_interval: 200
  enable_progress_bar: true
  precision: 16-mixed

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: 500
